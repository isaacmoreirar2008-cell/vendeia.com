<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendeIA · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animated-bg"></div>
    <div id="cursor-glow"></div>
    <canvas id="particles-canvas"></canvas>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-logo">VendeIA</div>
            <nav class="sidebar-nav">
                <a href="#" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="#"><i class="fas fa-bullhorn"></i> Marketing IA</a>
                <a href="#"><i class="fas fa-tags"></i> Promoções</a>
                <a href="#"><i class="fas fa-cog"></i> Configurações</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        <!-- Conteúdo principal -->
        <main class="dashboard-main">
            <header class="dashboard-header">
                <div>
                    <h1>Bem-vindo, <span id="userName"></span></h1>
                    <p class="plan-badge">Plano ativo: <span id="userPlan"></span></p>
                </div>
                <div class="header-actions">
                    <span class="company-name" id="companyName"></span>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="welcome-card">
                    <h2>Informações da sua conta</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">Empresa</span>
                            <span class="info-value" id="infoEmpresa"></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Nicho</span>
                            <span class="info-value" id="infoNicho"></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Email</span>
                            <span class="info-value" id="infoEmail"></span>
                        </div>
                    </div>
                    <a href="#" class="btn-primary dashboard-cta">Começar a usar a IA</a>
                </div>
            </div>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
