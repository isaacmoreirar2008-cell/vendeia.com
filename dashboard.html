<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendeIA · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Elementos do cursor e fundo -->
    <div class="animated-bg"></div>
    <div id="cursor-glow"></div>
    <canvas id="particles-canvas"></canvas>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-logo">VendeIA</div>
            <nav class="sidebar-nav">
                <a href="#" id="linkDashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="#" id="linkMarketing"><i class="fas fa-bullhorn"></i> Marketing IA</a>
                <a href="#" id="linkPromocoes"><i class="fas fa-tags"></i> Promoções</a>
                <a href="#" id="linkConfig"><i class="fas fa-cog"></i> Configurações</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        <!-- Conteúdo principal -->
        <main class="dashboard-main">
            <header class="dashboard-header">
                <div>
                    <h1>Bem-vindo, <span id="userName"></span></h1>
                    <p class="plan-badge">Plano ativo: <span id="userPlan"></span></p>
                </div>
                <div class="header-actions">
                    <span class="company-name" id="companyName"></span>
                </div>
            </header>

            <div class="dashboard-content" id="dashboardContent">
                <!-- Conteúdo carregado dinamicamente -->
            </div>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
