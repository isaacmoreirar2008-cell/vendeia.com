<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendeIA · Autenticação</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fundo animado (mesmo do site) -->
    <div class="animated-bg"></div>
    <div id="cursor-glow"></div>
    <canvas id="particles-canvas"></canvas>

    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <img src="assets/img/logo.png" alt="VendeIA" onerror="this.style.display='none'; this.parentElement.innerHTML='<span>VendeIA</span>'">
            </div>

            <!-- Plano escolhido via URL -->
            <div class="auth-plan-info" id="planInfo"></div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin" onclick="showLogin()">Entrar</button>
                <button class="auth-tab" id="tabRegister" onclick="showRegister()">Criar Conta</button>
            </div>

            <!-- FORMULÁRIO DE LOGIN -->
            <form id="loginForm" style="display: block;">
                <div class="auth-field">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                </div>
                <div class="auth-field">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <div class="auth-remember">
                    <input type="checkbox" id="loginRemember">
                    <label for="loginRemember">Lembrar sempre neste dispositivo</label>
                </div>
                <button type="submit" class="auth-btn">Entrar</button>
            </form>

            <!-- FORMULÁRIO DE CADASTRO -->
            <form id="registerForm" style="display: none;">
                <div class="auth-field">
                    <label>Nome completo</label>
                    <input type="text" id="regNome" placeholder="Seu nome" required>
                </div>
                <div class="auth-field">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="seu@email.com" required>
                </div>
                <div class="auth-field">
                    <label>Senha</label>
                    <input type="password" id="regPassword" placeholder="Crie uma senha" required>
                </div>
                <div class="auth-field">
                    <label>Nome da empresa</label>
                    <input type="text" id="regEmpresa" placeholder="Minha Empresa" required>
                </div>
                <div class="auth-field">
                    <label>Nicho da empresa</label>
                    <input type="text" id="regNicho" placeholder="Ex: Barbearia, Padaria" required>
                </div>
                <div class="auth-remember">
                    <input type="checkbox" id="regRemember">
                    <label for="regRemember">Lembrar sempre neste dispositivo</label>
                </div>
                <button type="submit" class="auth-btn">Criar Conta</button>
            </form>

            <!-- Mensagem de erro -->
            <div id="authError" class="auth-error"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
